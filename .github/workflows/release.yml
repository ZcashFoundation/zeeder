# The `released` trigger skips pre-releases until they are promoted to a full
# release.
name: Release

on:
  release:
    types: [released]

permissions: {}

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  HUB_IMAGE: docker.io/zfnd/dnsseeder

jobs:
  preflight:
    name: Validate release tag
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false

      - name: Check the tag against the Cargo.toml version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          manifest_version="$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)"
          if [ "${version}" != "${manifest_version}" ]; then
            echo "::error::release tag ${RELEASE_TAG} does not match Cargo.toml version ${manifest_version}"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  build-image:
    name: Build image (${{ matrix.platform }})
    needs: preflight
    if: github.repository_owner == 'ZcashFoundation'
    runs-on: ${{ matrix.runner }}
    environment: release
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false

      - name: Set SOURCE_DATE_EPOCH from the commit
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 #v6.2.0
        with:
          images: ${{ env.HUB_IMAGE }}

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 #v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c #v4.2.0

      # Pushed by digest only; the merge job tags the multi-arch manifest.
      - name: Build and push by digest
        id: docker_build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a #v7.3.0
        with:
          platforms: ${{ matrix.platform }}
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
          outputs: type=image,name=${{ env.HUB_IMAGE }},push-by-digest=true,name-canonical=true,push=true,rewrite-timestamp=true
          provenance: mode=max
          sbom: true
          no-cache: true

      - name: Export digest
        env:
          DIGEST: ${{ steps.docker_build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-image:
    name: Publish multi-arch image
    needs: [preflight, build-image]
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 15
    outputs:
      digest: ${{ steps.create.outputs.digest }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 #v6.2.0
        with:
          images: ${{ env.HUB_IMAGE }}
          # Each release is tagged in both styles (`1.4.0` and `v1.4.0`): bare
          # is the Docker norm, v-prefixed continues the existing tag line.
          # `latest` is added automatically for stable semver, never for pre-releases.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{raw}}

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 #v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest and push
        id: create
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          # The -t flags and the per-arch image refs expand to separate args.
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${DOCKER_METADATA_OUTPUT_JSON}") \
            $(printf "${HUB_IMAGE}@sha256:%s " *)

          docker buildx imagetools inspect "${HUB_IMAGE}:${VERSION}" \
            --format '{{json .Manifest}}' | jq -r '.digest' | tee /tmp/digest.txt
          echo "digest=$(cat /tmp/digest.txt)" >> "${GITHUB_OUTPUT}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.HUB_IMAGE }}
          subject-digest: ${{ steps.create.outputs.digest }}
          push-to-registry: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the image with Cosign
        env:
          DIGEST: ${{ steps.create.outputs.digest }}
        run: cosign sign --yes "${HUB_IMAGE}@${DIGEST}"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.HUB_IMAGE }}@${{ steps.create.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ env.HUB_IMAGE }}
          subject-digest: ${{ steps.create.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Verify release signatures
        env:
          DIGEST: ${{ steps.create.outputs.digest }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          cosign verify "${HUB_IMAGE}@${DIGEST}" \
            --certificate-identity-regexp="^https://github\\.com/${REPOSITORY}/\\.github/workflows/release\\.yml@" \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          gh attestation verify "oci://${HUB_IMAGE}@${DIGEST}" \
            --repo "${REPOSITORY}" \
            --signer-workflow "${REPOSITORY}/.github/workflows/release.yml"

  propose-deploy:
    name: Propose fleet image pin
    needs: [preflight, publish-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false

      - name: Pin fleet image
        env:
          DIGEST: ${{ needs.publish-image.outputs.digest }}
          HUB_IMAGE: ${{ env.HUB_IMAGE }}
        run: |
          set -euo pipefail
          printf '%s@%s\n' "${HUB_IMAGE}" "${DIGEST}" > deploy/gcp/IMAGE

      - name: Open deploy pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: deploy/image-${{ needs.preflight.outputs.version }}
          title: "deploy: pin fleet to zeeder ${{ needs.preflight.outputs.version }}"
          commit-message: "deploy: pin fleet to zeeder ${{ needs.preflight.outputs.version }}"
          body: |
            Pins the GCP fleet deployment image to zeeder ${{ needs.preflight.outputs.version }}.
            Merging this PR remains a human deployment decision.
          add-paths: deploy/gcp/IMAGE
          delete-branch: true

  build-binaries:
    name: Build binary (${{ matrix.target }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
    # Attestation is generated in the same job that produces the binary so the
    # provenance describes the actual build environment, not the publisher's.
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      TARGET: ${{ matrix.target }}
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          cache-on-failure: true

      - name: Build and package zeeder
        run: |
          set -euo pipefail
          SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          export SOURCE_DATE_EPOCH
          # Keep build-host paths out of the binary.
          export RUSTFLAGS="--remap-path-prefix=${GITHUB_WORKSPACE}=/zeeder --remap-path-prefix=${HOME}/.cargo=/cargo"
          export CARGO_PROFILE_RELEASE_STRIP=symbols
          cargo build --locked --release

          # Documented glibc floor for the pre-built binaries (Ubuntu 22.04+,
          # Debian 12+, RHEL 9+). Bump together with docs/development.md.
          MAX_GLIBC=2.34
          # `|| floor=""` keeps pipefail from aborting before the explicit check.
          floor=$(objdump -T target/release/zeeder | grep -oE 'GLIBC_[0-9.]+' | sed 's/GLIBC_//' | sort -V | tail -1) || floor=""
          if [ -z "${floor}" ]; then
            echo "::error::could not parse glibc floor from zeeder"
            exit 1
          fi
          echo "glibc floor: ${floor}"
          if [ "$(printf '%s\n%s\n' "${floor}" "${MAX_GLIBC}" | sort -V | tail -1)" != "${MAX_GLIBC}" ]; then
            echo "::error::glibc floor ${floor} exceeds documented ${MAX_GLIBC}"
            exit 1
          fi

          stage="zeeder-${VERSION}-${TARGET}"
          mkdir -p "dist/${stage}"
          cp target/release/zeeder "dist/${stage}/zeeder"
          cp LICENSE-APACHE LICENSE-MIT README.md "dist/${stage}/"
          tar --sort=name --owner=0 --group=0 --numeric-owner \
            --mtime="@${SOURCE_DATE_EPOCH}" \
            -cf - -C "dist/${stage}" zeeder LICENSE-APACHE LICENSE-MIT README.md \
            | gzip -n > "dist/${stage}.tar.gz"
          rm -rf "dist/${stage}"
          ( cd dist && sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*.tar.gz

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish-binaries:
    name: Sign and publish binaries
    needs: build-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: read
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          path: staging
          pattern: binary-*
          merge-multiple: true

      - name: Collect archives and generate the checksum manifest
        run: |
          set -euo pipefail
          mkdir -p dist
          mv staging/*.tar.gz staging/*.tar.gz.sha256 dist/
          ( cd dist && sha256sum -- *.tar.gz > SHA256SUMS )

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the checksum manifest
        working-directory: dist
        run: cosign sign-blob --yes --bundle SHA256SUMS.sigstore.json SHA256SUMS

      - name: Verify signatures
        working-directory: dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cosign verify-blob SHA256SUMS \
            --bundle SHA256SUMS.sigstore.json \
            --certificate-identity-regexp="^https://github\\.com/${REPOSITORY}/\\.github/workflows/release\\.yml@" \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          for archive in *.tar.gz; do
            gh attestation verify "${archive}" \
              --repo "${REPOSITORY}" \
              --signer-workflow "${REPOSITORY}/.github/workflows/release.yml"
          done

      - name: Upload binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            dist/*.tar.gz dist/*.sha256 dist/SHA256SUMS dist/SHA256SUMS.sigstore.json \
            --repo "${REPOSITORY}" --clobber
