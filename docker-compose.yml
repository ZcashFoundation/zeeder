name: zebra-seeder

services:
  seeder:
    build: .
    restart: unless-stopped
    ports:
      # Host DNS port 53 maps to the container's non-root DNS port.
      - "53:1053/udp"
      - "53:1053/tcp"
      - "9999:9999/tcp"
    volumes:
      - ./cache:/cache
    environment:
      - ZEBRA_SEEDER__CRAWLER__NETWORK=Testnet
      - ZEBRA_SEEDER__DNS__LISTEN_ADDR=0.0.0.0:1053
      - ZEBRA_SEEDER__DNS__DOMAIN=testnet.seeder.example.com
      - ZEBRA_SEEDER__DNS__TTL=600
      - ZEBRA_SEEDER__METRICS__ENDPOINT_ADDR=0.0.0.0:9999
